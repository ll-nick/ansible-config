- name: Ensure Fonts Directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts"
    state: directory

- name: Install fontconfig
  become: true
  when: run_privileged
  ansible.builtin.package:
    name:
      - fontconfig
    state: present

- name: Install fallback font
  become: true
  when:
    - run_privileged
    - ansible_distribution in ["Debian", "Ubuntu"]
  ansible.builtin.package:
    name:
      - fonts-noto
    state: present

- name: Install fallback font
  become: true
  when:
    - run_privileged
    - ansible_distribution == "Archlinux"
  ansible.builtin.package:
    name:
      - noto-fonts
    state: present

- name: Check Font Exists
  ansible.builtin.shell: "fc-list | grep -q JetBrainsMono"
  register: font_exists
  changed_when: false
  ignore_errors: true

- when: font_exists.rc != 0
  block:
    - name: Install unzip
      become: true
      when: run_privileged
      ansible.builtin.package:
        name: unzip
        state: present

    - name: Download and Extract
      ansible.builtin.unarchive:
        src: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ nerdfont_version }}/JetBrainsMono.zip"
        dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts/"
        remote_src: yes

