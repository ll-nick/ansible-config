- name: Install apt dependencies
  become: true
  when:
    - run_privileged
    - ansible_distribution in ["Debian", "Ubuntu"]
  ansible.builtin.package:
    name:
      - locales
    state: present

- name: Install locales
  become: true
  when:
    - run_privileged
    # This module is currently only supported by these distros
    - ansible_distribution in ["Debian", "Ubuntu"]
  community.general.locale_gen:
    name:
      - de_DE.UTF-8
      - en_US.UTF-8
    state: present
